name: Daily news scan

on:
  schedule:
    - cron: '0 3 * * *'   # 9 AM Bangladesh time
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install ALL required packages
      - name: Install packages
        run: pip install feedparser pyyaml

      # Step 1: Collect news
      - name: Run collector
        run: python scripts/collector.py

      # Step 2: Interpret events into signals
      - name: Run interpreter
        run: python interpret_events.py

      # Upload shortlist (for inspection)
      - name: Upload candidates
        uses: actions/upload-artifact@v4
        with:
          name: daily_candidates
          path: daily_candidates.json

      # Upload generated signal drafts
      - name: Upload signal drafts
        uses: actions/upload-artifact@v4
        with:
          name: signal_drafts
          path: drafts/
