name: Daily news scan

on:
  schedule:
    - cron: '0 3 * * *'   # 9 AM Bangladesh time
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install feedparser

      - name: Run collector
        run: python scripts/collector.py

      - name: Upload file
        uses: actions/upload-artifact@v4
        with:
          name: daily_candidates
          path: daily_candidates.json
